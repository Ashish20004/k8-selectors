apiVersion: v1
kind: Pod
metadata:
  name: nginx-Pod
  labels: 
    env: test
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values:
            - us-east-1a
            - us-east-1b
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 10
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - roboshop
      - weight: 5
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - roboshop-test
      containers:
      - name: nginx
        image: nginx
        
